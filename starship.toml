format = """
[─]($all)$line_break$directory$git_branch$git_status$rust$python$nodejs$golang$dockercontext$line_break$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[❯](bold green)"

[directory]
style = "bold cyan"
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold green"

[git_status]
style = "bold red"
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇅${ahead_count}|${behind_count}"
untracked = "🤔"
stashed = "📦"
modified = "!${count}"
staged = '[++\($count\)](green)'
renamed = "»${count}"
deleted = "✘${count}"

[rust]
style = "bold red"

[python]
style = "bold yellow"

[nodejs]
style = "bold green"

[golang]
style = "bold cyan"

[docker_context]
default = "🦭"

[line_break]
disabled = false

# Set the timeout to 2000 milliseconds (2 seconds)
command_timeout = 2000
